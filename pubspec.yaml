name: pint_mobile
description: "Plataforma de Badges da Softinsa - BadgeBoost Mobile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Navegação ---
  # Gestão de rotas com suporte a parâmetros e navegação aninhada
  go_router: ^14.0.0

  # --- Estado (State Management) ---
  # Riverpod é a solução moderna do Flutter para gerir estado de forma simples
  flutter_riverpod: ^2.5.1

  # --- HTTP / API REST ---
  # Para fazer chamadas à API REST (GET, POST, PUT, DELETE)
  http: ^1.2.1

  # --- Base de dados local (sqflite) ---
  # Requisito obrigatório do trabalho: base de dados local para modo offline
  sqflite: ^2.3.3
  # Ajuda a encontrar o caminho correto para guardar a base de dados no dispositivo
  path_provider: ^2.1.3
  path: ^1.9.0

  # --- Autenticação / Sessão ---
  # Guarda o token JWT e preferências simples do utilizador de forma persistente
  shared_preferences: ^2.2.3

  # --- Imagens ---
  # Carrega imagens da internet com cache automático (evita re-download)
  cached_network_image: ^3.3.1

  # --- Upload de ficheiros (evidências) ---
  # Permite ao utilizador escolher ficheiros PDF, ZIP, imagens para as candidaturas
  file_picker: ^8.0.3

  # --- Gráficos (Dashboard) ---
  # Para o gráfico de evolução mensal no dashboard
  fl_chart: ^0.68.0

  # --- Notificações locais ---
  # Para lembretes de objetivos e alertas de expiração de badges
  flutter_local_notifications: ^17.2.2

  # --- PDF ---
  # Para gerar e fazer download de certificados em PDF
  pdf: ^3.10.8
  printing: ^5.13.1

  # --- Partilha (LinkedIn, etc.) ---
  # Para abrir URLs externas como o perfil LinkedIn ou a página pública do badge
  url_launcher: ^6.3.0

  # --- Formatação de datas ---
  # Facilita muito o trabalho com datas (ex: "há 3 dias", formatação PT)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/